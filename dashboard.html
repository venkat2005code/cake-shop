<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | La Maison Luxury Atelier</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <style>
        html {
            height: 100%;
            overflow: hidden;
            /* Eliminates high-fidelity double-scroll collision */
        }

        body.dashboard-body {
            display: flex;
            height: 100%;
            overflow-y: auto;
            background: var(--background);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .dashboard-sidebar {
            width: 280px;
            background: #000;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.77, 0.2, 0.05, 1);
            border-right: 1px solid rgba(212, 175, 55, 0.15);
            overflow-y: auto;
            /* High-fidelity scroll for expanded atelier navigation */
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .dashboard-sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .dashboard-sidebar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .sidebar-logo {
            margin-bottom: 4rem;
            padding: 0 1rem;
        }

        .sidebar-logo img {
            height: 50px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .sidebar-logo a {
            display: block;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1rem 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .nav-link i {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(212, 175, 55, 0.1);
        }

        .nav-link.logout {
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 2rem;
            border-radius: 0;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .sidebar-footer .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .sidebar-footer .icon-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .dashboard-main {
            flex: 1;
            margin-left: 280px;
            padding: 4rem;
            background: var(--background);
        }

        .dashboard-header {
            margin-bottom: 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--text);
            margin: 0;
            line-height: 1.1;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* Medium sized - 2 per row */
            gap: 4rem; /* Standard-setting prestigious spacing */
        }

        .chart-card {
            background: transparent; /* High-fidelity 'free' manifestation */
            padding: 1rem;
            border-radius: 0;
            border: none;
            box-shadow: none;
            transition: all 0.3s ease;
            height: 300px; /* Precision 'small' constraint for pie charts */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chart-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .chart-card.reveal {
            transform: none !important; /* Force high-fidelity vertical stability - stops 'moving downwards' */
            opacity: 1 !important; /* Instant manifestation for premium clarity */
            visibility: visible !important;
        }

        .chart-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 2rem;
            color: var(--text);
            font-weight: 600;
        }

        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #000;
            z-index: 1005;
            /* Absolute priority */
            padding: 0 2rem;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .mobile-header .user-avatar {
            width: 40px !important;
            height: 40px !important;
            font-size: 1rem !important;
            background: var(--primary) !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: #000 !important;
            font-weight: 700 !important;
        }

        .mobile-toggle {
            background: transparent;
            color: var(--primary);
            font-size: 1.8rem;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 1400px) {
            .dashboard-main {
                padding: 3rem;
            }
        }

        @media (max-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr;
                /* Stack earlier for readable sizing */
            }
        }

        @media (max-width: 991px) {
            .dashboard-sidebar {
                transform: translateX(-100%);
                padding-top: 90px !important; /* Forces high-fidelity logo visibility below mobile header */
            }

            .sidebar-logo {
                padding-left: 2.5rem !important; /* Precision 'right align slight' editorial shift */
                margin-bottom: 3rem !important;
            }

            .dashboard-sidebar.active {
                transform: translateX(0);
            }

            .dashboard-main {
                margin-left: 0 !important;
                padding: 7rem 1.5rem 2.5rem !important;
                width: 100% !important;
                max-width: 100vw !important;
                overflow-x: hidden !important;
            }

            .mobile-header {
                display: flex !important;
                width: 100vw !important;
            }

            .dashboard-header {
                flex-direction: column !important;
                text-align: center !important;
                gap: 2rem;
                margin-bottom: 3rem;
            }

            .user-profile {
                display: none !important; /* Managed by mobile-header exclusively */
                flex-direction: column !important;
                gap: 1rem;
            }

            .user-profile div:first-child {
                text-align: center !important;
            }

            .dashboard-header h1 {
                font-size: 1.8rem !important;
                /* Resized for elite mobile clarity */
            }

            .chart-card {
                padding: 1rem !important; /* Premium space conservation on mobile */
                height: 250px !important; /* Scaled down for mobile clarity */
                min-height: auto !important;
            }

            .charts-grid {
                gap: 3rem !important; /* Refined mobile spacing */
            }
        }

        @media (max-width: 600px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="dashboard-body" data-theme="light">

    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="user-avatar">J</div>
        <button class="mobile-toggle" id="sidebar-toggle">
            <i class="bi bi-list"></i>
        </button>
    </div>

    <!-- Sidebar Section -->
    <aside class="dashboard-sidebar" id="dashboard-sidebar">
        <div class="sidebar-logo">
            <a href="index.html"><img src="assets/images/logo.png" alt="La Maison Logo"></a>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-link active"><i class="bi bi-grid-1x2-fill"></i> Analytics Overview</a>
            <a href="#" class="nav-link"><i class="bi bi-bag-check"></i> Orders & History</a>
            <a href="#" class="nav-link"><i class="bi bi-calendar-event"></i> My Reservations</a>
            <a href="#" class="nav-link"><i class="bi bi-award"></i> Loyalty Rewards</a>
            <a href="#" class="nav-link"><i class="bi bi-heart"></i> Saved Designs</a>
            <a href="#" class="nav-link"><i class="bi bi-gear"></i> Account Settings</a>
            <a href="index.html" class="nav-link logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </nav>

        <div class="sidebar-footer">
            <button class="icon-btn" id="dir-toggle-dash" title="Toggle RTL/LTR"><i class="bi bi-globe"></i></button>
            <button class="icon-btn" id="theme-toggle-dash" title="Toggle Theme"><i
                    class="bi bi-moon-stars-fill"></i></button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="dashboard-main">
        <header class="dashboard-header">
            <div></div>
            <div class="user-profile">
                <!-- Avatar only shown here on Desktop -->
                <div class="user-avatar">J</div>
            </div>
        </header>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <div class="chart-card reveal">
                <h3>Flavor Popularity</h3>
                <canvas id="chart1"></canvas>
            </div>
            <div class="chart-card reveal">
                <h3>Monthly Orders</h3>
                <canvas id="chart2"></canvas>
            </div>
            <div class="chart-card reveal">
                <h3>Global Delivery Reach</h3>
                <canvas id="chart3"></canvas>
            </div>
            <div class="chart-card reveal">
                <h3>Ingredient Sourcing</h3>
                <canvas id="chart4"></canvas>
            </div>
            <div class="chart-card reveal">
                <h3>Loyalty Point Growth</h3>
                <canvas id="chart5"></canvas>
            </div>
            <div class="chart-card reveal">
                <h3>Design Consultations</h3>
                <canvas id="chart6"></canvas>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Dashboard Chart Implementation
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false, /* High-fidelity fitting within mobile limits */
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    display: true,
                    beginAtZero: true,
                    grid: { color: 'rgba(212, 175, 55, 0.05)' },
                    ticks: { color: 'rgba(255,255,255,0.4)', font: { family: 'Outfit' } }
                },
                x: {
                    display: true,
                    grid: { display: false },
                    ticks: { color: 'rgba(255,255,255,0.4)', font: { family: 'Outfit' } }
                }
            }
        };

        // Chart 1: Pie (Replaced Bar)
        new Chart(document.getElementById('chart1'), {
            type: 'pie',
            data: {
                labels: ['Vanilla', 'Chocolate', 'Strawberry', 'Pistachio', 'Red Velvet'],
                datasets: [{
                    data: [12, 19, 13, 15, 12],
                    backgroundColor: ['#D4AF37', '#1A1A1A', '#333', '#555', '#777'],
                    borderWidth: 0
                }]
            },
            options: { ...chartOptions, scales: null }
        });

        // Chart 2: Pie (Replaced Line)
        new Chart(document.getElementById('chart2'), {
            type: 'pie',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                datasets: [{
                    data: [10, 25, 15, 30, 20],
                    backgroundColor: ['#D4AF37', '#222', '#444', '#666', '#888'],
                    borderWidth: 0
                }]
            },
            options: { ...chartOptions, scales: null }
        });

        // Chart 3: Doughnut
        new Chart(document.getElementById('chart3'), {
            type: 'doughnut',
            data: {
                labels: ['Domestic', 'International'],
                datasets: [{
                    data: [70, 30],
                    backgroundColor: ['#D4AF37', '#1A1A1A'],
                    borderWidth: 0
                }]
            },
            options: { ...chartOptions, scales: null }
        });

        // Chart 4: Polar Area
        new Chart(document.getElementById('chart4'), {
            type: 'polarArea',
            data: {
                labels: ['Cocoa', 'Vanilla', 'Butter', 'Fruit'],
                datasets: [{
                    data: [11, 16, 7, 14],
                    backgroundColor: ['rgba(212, 175, 55, 0.8)', '#1A1A1A', '#333', '#555']
                }]
            },
            options: { ...chartOptions, scales: null, plugins: { legend: { display: false } } }
        });

        // Chart 5: Pie
        new Chart(document.getElementById('chart5'), {
            type: 'pie',
            data: {
                labels: ['Earned', 'Spent'],
                datasets: [{
                    data: [80, 20],
                    backgroundColor: ['#D4AF37', '#222'],
                    borderWidth: 0
                }]
            },
            options: { ...chartOptions, scales: null }
        });

        // Chart 6: Radar
        new Chart(document.getElementById('chart6'), {
            type: 'radar',
            data: {
                labels: ['Taste', 'Visual', 'Modern', 'Classic', 'Custom'],
                datasets: [{
                    data: [100, 90, 80, 70, 95],
                    borderColor: '#D4AF37',
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    pointRadius: 0
                }]
            },
            options: { ...chartOptions, scales: { r: { display: false } } }
        });

        // Mobile Sidebar Toggle Script
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('dashboard-sidebar');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            const icon = sidebarToggle.querySelector('i');
            icon.classList.toggle('bi-list');
            icon.classList.toggle('bi-x-lg');
        });

        // Close sidebar on link click (mobile)
        document.querySelectorAll('.dashboard-sidebar .nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 991) {
                    sidebar.classList.remove('active');
                    const icon = sidebarToggle.querySelector('i');
                    icon.classList.add('bi-list');
                    icon.classList.remove('bi-x-lg');
                }
            });
        });

        // Dashboard specific theme/dir toggles
        document.getElementById('theme-toggle-dash').addEventListener('click', () => {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            const icon = document.querySelector('#theme-toggle-dash i');
            icon.className = newTheme === 'light' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
        });

        document.getElementById('dir-toggle-dash').addEventListener('click', () => {
            const html = document.documentElement;
            html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
        });
    </script>
</body>

</html>
