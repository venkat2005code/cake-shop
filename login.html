<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OVEN Luxury Atelier</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <style>
        body {
            overflow: hidden; /* Point 5: Single viewport */
        }

        .auth-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('assets/images/bakery-interior.png') center/cover no-repeat;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            position: relative;
        }

        .auth-logo {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center; /* Point 7: Centered logo */
        }

        .auth-logo img {
            height: 70px;
            cursor: pointer;
        }

        .auth-header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-family: var(--font-heading);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--background);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* Social Logins (Point 14) */
        .social-logins {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn.google:hover { background: #f1f1f1; border-color: #4285F4; color: #4285F4; }
        .social-btn.facebook:hover { background: #f1f1f1; border-color: #1877F2; color: #1877F2; }

        .auth-divider {
            margin: 1.5rem 0;
            position: relative;
            text-align: center;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
        }

        .auth-divider span {
            position: relative;
            background: var(--surface);
            padding: 0 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .auth-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        /* Controls */
        .top-controls {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body data-theme="light">

    <div class="auth-wrapper">
        <!-- Top Corner Controls -->
        <div class="top-controls">
            <button class="control-btn" id="dir-toggle-auth" title="Toggle RTL/LTR"><i class="bi bi-globe"></i></button>
            <button class="control-btn" id="theme-toggle-auth" title="Toggle Theme"><i class="bi bi-moon-stars-fill"></i></button>
        </div>

        <div class="auth-container">
            <div class="auth-logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; justify-content: center;">
                    <svg viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" style="height: 60px; width: auto;">
                        <defs>
                            <linearGradient id="premiumGoldAuth" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#F2D06B;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M15 45 C 15 20, 55 20, 55 45" stroke="url(#premiumGoldAuth)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <path d="M27 45 L 43 45 M 35 37 L 35 53" stroke="url(#premiumGoldAuth)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                        <circle cx="35" cy="45" r="14" stroke="url(#premiumGoldAuth)" stroke-width="1" fill="none" opacity="0.4"/>
                        <text x="75" y="48" fill="var(--text)" font-family="'Playfair Display', serif" font-size="32" font-weight="700" letter-spacing="8">OVEN</text>
                    </svg>
                </a>
            </div>
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your OVEN Specialty account</p>
            </div>
            
            <form action="dashboard.html">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="monsieur@ovenbakery.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div style="text-align: right; margin-bottom: 1rem;">
                    <a href="#" style="color: var(--primary); font-size: 0.85rem; font-weight: 500;">Forgot Password?</a>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <div class="auth-divider">
                <span>Or login with</span>
            </div>

            <div class="social-logins">
                <button class="social-btn google"><i class="bi bi-google"></i> Google</button>
                <button class="social-btn facebook"><i class="bi bi-facebook"></i> Facebook</button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register Now</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('theme-toggle-auth').addEventListener('click', () => {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            const icon = document.querySelector('#theme-toggle-auth i');
            icon.className = newTheme === 'light' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
        });

        document.getElementById('dir-toggle-auth').addEventListener('click', () => {
            const html = document.documentElement;
            html.dir = html.dir === 'rtl' ? 'ltr' : 'rtl';
        });
    </script>
</body>
</html>
